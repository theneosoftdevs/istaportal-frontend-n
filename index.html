<!doctype html>
<html lang="fr" class="bg-background">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport & display -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- App meta -->
    <meta name="application-name" content="ISTA PORTAL" />
    <meta name="description" content="Plateforme de Gestion Universitaire — Institut Supérieur des Techniques Appliquées de Goma" />
    <meta name="keywords" content="ISTA, GOMA, université, portail, académique, étudiant, enseignant" />
    <meta name="author" content="ISTA-GOMA" />

    <!-- PWA essential -->
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1d4ed8" media="(prefers-color-scheme: dark)" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ISTA PORTAL" />
    <link rel="apple-touch-icon" href="/ista.jpeg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/ista.jpeg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/ista.jpeg" />
    <link rel="apple-touch-icon" sizes="167x167" href="/ista.jpeg" />

    <!-- Windows / Microsoft tiles -->
    <meta name="msapplication-TileImage" content="/ista.jpeg" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Favicons -->
    <link rel="icon" type="image/jpeg" href="/ista.jpeg" />
    <link rel="shortcut icon" href="/ista.jpeg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>ISTA PORTAL</title>

    <script>
      // Capture PWA install prompt as early as possible (Android/Chrome)
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.deferredPrompt = e;
      });

      // Apply saved theme before React mounts to avoid flash
      (function() {
        var t = localStorage.getItem('ista-theme') || 'dark';
        document.documentElement.classList.toggle('dark', t === 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
